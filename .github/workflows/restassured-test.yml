name: Rest Assured API Testing
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Build and run tests (Maven)
        run: mvn -B -U test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: "Debug: list target folder after tests"
        if: always()
        run: |
          echo "Listing repo root:"
          ls -la
          echo "Listing target (if exists):"
          ls -la target || true

      - name: "Install Allure CLI (no apt-get/unzip required)"
        if: always()
        run: |
          # Download Allure zip and extract using the JDK 'jar' tool to avoid apt-get/unzip issues
          ALLURE_VER=2.29.1
          echo "Downloading Allure ${ALLURE_VER}"
          wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VER}/allure-${ALLURE_VER}.zip -O /tmp/allure.zip
          mkdir -p /opt/allure-${ALLURE_VER}
          # Use jar to extract the zip (jar is available with JDK)
          (cd /opt/allure-${ALLURE_VER} && jar -xf /tmp/allure.zip)
          echo "/opt/allure-${ALLURE_VER}/bin" >> $GITHUB_PATH
          echo "Allure installed to /opt/allure-${ALLURE_VER}"

      - name: Generate Allure HTML report
        if: always()
        run: |
          # Generate report from results (if results exist)
          if [ -d target/allure-results ]; then
            allure generate target/allure-results -o target/allure-report --clean || true
          else
            echo "No allure results found at target/allure-results"
          fi

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
