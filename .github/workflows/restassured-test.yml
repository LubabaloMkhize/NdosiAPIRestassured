name: Rest Assured API Testing
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Build and run tests (Maven)
        run: mvn -B -U test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: "Debug: list target folder after tests"
        if: always()
        run: |
          echo "Listing repo root:"
          ls -la
          echo "Listing target (if exists):"
          ls -la target || true

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VER=2.29.1

          URL="https://github.com/allure-framework/allure2/releases/download/${ALLURE_VER}/allure-${ALLURE_VER}.zip"

          echo "Downloading from:"
          echo "$URL"

          wget "$URL" -O /tmp/allure.zip

          ls -lh /tmp/allure.zip

      - name: Generate Allure HTML report
        if: always()
        run: |
          # Generate report from results (if results exist)
          if [ -d target/allure-results ]; then
            allure generate target/allure-results -o target/allure-report --clean || true
          else
            echo "No allure results found at target/allure-results"
          fi
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: target/allure-results
          allure_report: target/allure-report

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
